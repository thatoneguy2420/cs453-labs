services:
  postgres:
    image: postgres:16
    container_name: lab05-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lab05
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
